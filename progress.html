    <script>
        function addSessionHours() {
            const hours = parseFloat(document.getElementById('sessionHours').value);
            if (isNaN(hours) || hours <= 0) {
                alert('0蹂대떎 ???쒓컙???낅젰?댁＜?몄슂.');
                return;
            }

            const data = getData();
            data.hoursSpent = (data.hoursSpent || 0) + hours;
            saveData(data);

            document.getElementById('sessionHours').value = '';
            updateProgressDisplay();
        }

        function updatePhaseProgress(phase) {
            const input = document.getElementById(`phase${phase}Input`);
            const progress = parseInt(input.value);

            if (isNaN(progress) || progress < 0 || progress > 100) {
                alert('0~100 ?ъ씠??媛믪쓣 ?낅젰?댁＜?몄슂.');
                return;
            }

            const data = getData();
            data[`phase${phase}Progress`] = progress;
            saveData(data);

            input.value = '';
            updateProgressDisplay();
        }

        function updateProgressDisplay() {
            const data = getData();

            const p1 = data.phase1Progress || 0;
            const p2 = data.phase2Progress || 0;
            const p3 = data.phase3Progress || 0;
            const hours = data.hoursSpent || 0;

            document.getElementById('phase1Progress').textContent = p1;
            document.getElementById('phase2Progress').textContent = p2;
            document.getElementById('phase3Progress').textContent = p3;

            document.getElementById('phase1Bar').style.width = p1 + '%';
            document.getElementById('phase1Bar').textContent = p1 + '%';

            document.getElementById('phase2Bar').style.width = p2 + '%';
            document.getElementById('phase2Bar').textContent = p2 + '%';

            document.getElementById('phase3Bar').style.width = p3 + '%';
            document.getElementById('phase3Bar').textContent = p3 + '%';

            const overall = Math.round((p1 + p2 + p3) / 3);
            document.getElementById('overallProgress').textContent = overall;
            document.getElementById('overallBar').style.width = overall + '%';
            document.getElementById('overallBar').textContent = overall + '%';

            document.getElementById('totalHours').textContent = hours.toFixed(1);
            document.getElementById('statsHours').textContent = hours.toFixed(1);

            const concepts = (data.concepts || []).length;
            const ideas = (data.ideas || []).length;
            const files = (data.filesReviewed || []).length;

            document.getElementById('statsConcepts').textContent = concepts;
            document.getElementById('statsIdeas').textContent = ideas;
            document.getElementById('statsFiles').textContent = files;
        }

        function addProgressNote() {
            const note = document.getElementById('progressNote').value.trim();
            if (!note) {
                alert('?숈뒿 ?명듃瑜??낅젰?댁＜?몄슂.');
                return;
            }

            const data = getData();
            data.progressNotes = data.progressNotes || [];
            data.progressNotes.push({
                id: Date.now(),
                content: note,
                date: new Date().toISOString()
            });

            saveData(data);
            document.getElementById('progressNote').value = '';
            renderNotes();
        }

        function deleteNote(id) {
            if (confirm('???명듃瑜???젣?섏떆寃좎뒿?덇퉴?')) {
                const data = getData();
                data.progressNotes = (data.progressNotes || []).filter(n => n.id !== id);
                saveData(data);
                renderNotes();
            }
        }

        function renderNotes() {
            const data = getData();
            const notes = (data.progressNotes || []).sort((a, b) =>
                new Date(b.date) - new Date(a.date)
            );

            const container = document.getElementById('notesList');
            if (notes.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">?숈뒿 ?명듃媛 ?놁뒿?덈떎.</p>';
            } else {
                container.innerHTML = notes.map(n => `
                    <div style="padding: 15px; background: #f9fafb; border-radius: 6px; border-left: 4px solid #0284c7; margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <p style="margin: 0 0 5px 0; color: #666; font-size: 12px;">${new Date(n.date).toLocaleString('ko-KR')}</p>
                                <p style="margin: 0; line-height: 1.6; color: #333;">${n.content.replace(/\n/g, '<br>')}</p>
                            </div>
                            <button class="btn btn-secondary" onclick="deleteNote(${n.id})" style="background: #ef4444; color: white; padding: 5px 10px; font-size: 12px; margin-left: 10px;">??젣</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function exportDataJSON() {
            const data = getData();

            // ?곸꽭 ?뺣낫 異붽?
            const exportData = {
                exportDate: new Date().toISOString(),
                platform: {
                    name: '援먯젙???숈뒿 ?뚮옯??,
