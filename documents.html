<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 - 교정학 학습 플랫폼</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .resource-card { padding: 15px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .resource-card:hover { border-color: #8b5cf6; box-shadow: 0 2px 8px rgba(139, 92, 246, 0.1); background: #faf5ff; transform: translateY(-2px); }
        .resource-card h4 { margin: 0 0 8px 0; color: #1f2937; font-size: 15px; }
        .resource-card p { margin: 0 0 10px 0; font-size: 13px; color: #666; line-height: 1.4; }
        .resource-badge { display: inline-block; padding: 4px 8px; background: #f3e8ff; color: #8b5cf6; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: #faf5ff; padding: 15px; border-radius: 8px; border-left: 4px solid #8b5cf6; text-align: center; }
        .stat-number { font-size: 24px; font-weight: 700; color: #8b5cf6; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .filter-section { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .filter-button { padding: 8px 16px; background: white; border: 1px solid #e9d5ff; color: #8b5cf6; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .filter-button.active { background: #8b5cf6; color: white; border-color: #8b5cf6; }
        .hidden-nav { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>🎓 교정학 학습 플랫폼</h1>
        <p>Kim Yong Eul의 Equilibrium Zone 방법론 + 명문출판사 교과서 완전 통합</p>
    </header>
    <nav>
        <a href="index.html">🏠 홈</a>
        <a href="resources.html">📚 자료</a>
        <a href="learning-materials.html">📖 학습자료</a>
        <a href="learning-path.html">🎓 학습경로</a>
        <a href="concepts.html">💡 개념정리</a>
        <a href="ideas.html">💭 플랫폼개선</a>
        <a href="progress.html">⏱️ 진도</a>
        <a href="application.html">🚀 플랫폼적용</a>
        <a href="webceph.html">🔍 웹셉·세팔로</a>
        <a href="comparison.html">⚖️ EZM 비교</a>
        <a href="wiki-vault-index.html">🧠 위키볼트</a>
    </nav>
    <!-- 리소스 상세 모달 -->
    <div id="resourceModal" class="resource-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="resource-modal-content" style="background: white; border-radius: 12px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); position: relative;">
            <button onclick="closeResourceModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; cursor: pointer; color: #999;">×</button>
            <div id="resourceDetail"></div>
        </div>
    </div>

    <div class="container">
        <div class="card" style="background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%); border: 2px solid #8b5cf6; margin-bottom: 30px;">
            <h2 style="color: #8b5cf6; margin-top: 0;">📄 학습 문서</h2>
            <p style="color: #1f2937; font-size: 16px; line-height: 1.8;">논문, 가이드, 참고자료 등 <strong>21개의 문서</strong></p>
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number">21</div>
                    <div class="stat-label">문서</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">6</div>
                    <div class="stat-label">문서 유형</div>
                </div>
            </div>
        </div>
        <div class="card">
            <h3>🔍 문서 필터</h3>
            <p style="color: #666; font-size: 13px; margin-bottom: 15px;">문서 유형을 선택하여 필터링하세요</p>
            <div class="filter-section">
                <button class="filter-button active" onclick="filterDocs('all')">전체 (21개)</button>
                <button class="filter-button" onclick="filterDocs('논문')">논문</button>
                <button class="filter-button" onclick="filterDocs('가이드')">가이드</button>
                <button class="filter-button" onclick="filterDocs('양식')">양식</button>
                <button class="filter-button" onclick="filterDocs('참고자료')">참고자료</button>
            </div>
        </div>
        <div class="card">
            <h3>📚 전체 문서 목록</h3>
            <div class="resource-grid"></div>
        </div>
        <footer>
            <div class="footer-container">
                <div class="footer-section">
                    <h3>📚 학습자료</h3>
                    <ul>
                        <li><a href="learning-materials.html">전체 학습자료</a></li>
                        <li><a href="slides.html">45개 슬라이드</a></li>
                        <li><a href="documents.html">21개 문서</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-bottom">
                <p>© 2026 교정학 학습 플랫폼</p>
            </div>
        </footer>
    </div>
    <script src="common.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/chatbot.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.querySelector('.resource-grid');
            let html = '';
            resourcesData.documents.forEach(doc => {
                html += `<div class="resource-card" onclick="openResourceDetail('documents', ${doc.id})"><h4>📄 ${doc.title}</h4><p>${doc.desc}</p><span class="resource-badge">${doc.type}</span></div>`;
            });
            grid.innerHTML = html;
        });

        function filterDocs(type) {
            const buttons = document.querySelectorAll('.filter-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const grid = document.querySelector('.resource-grid');
            let html = '';

            if (type === 'all') {
                resourcesData.documents.forEach(doc => {
                    html += `<div class="resource-card" onclick="openResourceDetail('documents', ${doc.id})"><h4>📄 ${doc.title}</h4><p>${doc.desc}</p><span class="resource-badge">${doc.type}</span></div>`;
                });
            } else {
                resourcesData.documents.filter(doc => doc.type === type).forEach(doc => {
                    html += `<div class="resource-card" onclick="openResourceDetail('documents', ${doc.id})"><h4>📄 ${doc.title}</h4><p>${doc.desc}</p><span class="resource-badge">${doc.type}</span></div>`;
                });
            }

            grid.innerHTML = html;
        }
    </script>
</body>
</html>
